# SoftGlaze — nginx site config.
#   sudo cp deploy/nginx-softglaze.conf /etc/nginx/sites-available/softglaze
#   sudo ln -s /etc/nginx/sites-available/softglaze /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d stock.YOURSHOP.com     # adds HTTPS + auto-renew
#
# Serves the built web app (static) and proxies the API + uploads to the PM2 process.
server {
    listen 80;
    server_name stock.YOURSHOP.com;              # <-- change to your domain

    root /var/www/softglaze/apps/web/dist;
    index index.html;

    # API
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;                 # backup export / big reports
    }

    # Uploaded images (served by the API from %UPLOAD_DIR%)
    location /uploads/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
    }

    # SPA routing — every other path returns index.html
    location / {
        try_files $uri /index.html;
    }

    client_max_body_size 50m;                    # product images + JSON backup restore
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
